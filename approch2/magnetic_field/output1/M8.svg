    <line x1="400" y1="220" x2="490" y2="220"
          stroke="black" stroke-width="2"
          marker-end="url(#arrow)"/>
    <text x="495" y="215" font-size="14" font-style="italic">v</text>

    <line x1="400" y1="220" x2="400" y2="290"
