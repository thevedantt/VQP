
    <svg xmlns="http://www.w3.org/2000/svg"
         width="800" height="600"
         font-family="Arial, sans-serif">
      <defs>
        <marker id="arrow" markerWidth="10" markerHeight="7"
                refX="10" refY="3.5" orient="auto" markerUnits="strokeWidth">
          <polygon points="0 0, 10 3.5, 0 7" fill="black"/>
        </marker>
        <marker id="arrowSmall" markerWidth="8" markerHeight="6"
                refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
          <polygon points="0 0, 8 3, 0 6" fill="black"/>
        </marker>
        <marker id="arrowBlue" markerWidth="10" markerHeight="7"
                refX="10" refY="3.5" orient="auto" markerUnits="strokeWidth">
          <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
        </marker>
        <g id="dot">
          <circle cx="0" cy="0" r="6" fill="none" stroke="black" stroke-width="1.5"/>
          <circle cx="0" cy="0" r="2.5" fill="black"/>
        </g>
        <g id="cross">
          <circle cx="0" cy="0" r="6" fill="none" stroke="black" stroke-width="1.5"/>
          <line x1="-4" y1="-4" x2="4" y2="4" stroke="black" stroke-width="1.5"/>
          <line x1="-4" y1="4" x2="4" y2="-4" stroke="black" stroke-width="1.5"/>
        </g>
      </defs>
      <rect width="100%" height="100%" fill="white"/>
    
    <rect x="240" y="160" width="320" height="280"
          fill="none" stroke="black" stroke-width="2"/>

    <text x="385" y="145" font-size="15" font-weight="bold">Velocity Selector</text>

        <line x1="270" y1="195" x2="270" y2="245"
              stroke="black" stroke-width="1.5"
              marker-end="url(#arrow)"/>

        <line x1="320" y1="195" x2="320" y2="245"
              stroke="black" stroke-width="1.5"
              marker-end="url(#arrow)"/>

        <line x1="370" y1="195" x2="370" y2="245"
              stroke="black" stroke-width="1.5"
              marker-end="url(#arrow)"/>

        <line x1="420" y1="195" x2="420" y2="245"
              stroke="black" stroke-width="1.5"
              marker-end="url(#arrow)"/>

        <line x1="470" y1="195" x2="470" y2="245"
              stroke="black" stroke-width="1.5"
              marker-end="url(#arrow)"/>

        <line x1="520" y1="195" x2="520" y2="245"
              stroke="black" stroke-width="1.5"
              marker-end="url(#arrow)"/>

    <text x="248" y="235" font-size="14" font-style="italic">E</text>

        <use href="#cross" x="280" y="310"/>
        <use href="#cross" x="280" y="350"/>
        <use href="#cross" x="280" y="390"/>
        <use href="#cross" x="330" y="310"/>
        <use href="#cross" x="330" y="350"/>
        <use href="#cross" x="330" y="390"/>
        <use href="#cross" x="380" y="310"/>
        <use href="#cross" x="380" y="350"/>
        <use href="#cross" x="380" y="390"/>
        <use href="#cross" x="430" y="310"/>
        <use href="#cross" x="430" y="350"/>
        <use href="#cross" x="430" y="390"/>
        <use href="#cross" x="480" y="310"/>
        <use href="#cross" x="480" y="350"/>
        <use href="#cross" x="480" y="390"/>
    <text x="248" y="340" font-size="14" font-style="italic">B (⊗)</text>

    <line x1="100" y1="300" x2="220" y2="300"
          stroke="black" stroke-width="2"
          marker-end="url(#arrow)"/>
    <text x="225" y="295" font-size="14" font-style="italic">v</text>

    <circle cx="240" cy="300" r="10"
            fill="none" stroke="black" stroke-width="1.5"/>
    <text x="236" y="303" font-size="12" font-weight="bold">+q</text>

    <text x="300" y="455" font-size="13" font-style="italic" fill="#1976d2">qE = qvB → v = E/B</text>
    </svg>