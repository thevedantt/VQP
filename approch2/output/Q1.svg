
<svg xmlns="http://www.w3.org/2000/svg"
     width="1200"
     height="700">

<!-- Principal Axis -->

<line
    x1="50"
    y1="300"
    x2="1150"
    y2="300"
    stroke="black"
    stroke-width="2"/>

<!-- Convex Lens -->

<ellipse
    cx="500"
    cy="300"
    rx="15"
    ry="160"
    fill="none"
    stroke="blue"
    stroke-width="3"/>

<!-- Lens Label -->

<text
    x="455"
    y="120">
    Convex Lens
</text>

<!-- Focal Points -->

<circle cx="400" cy="300" r="4" fill="black"/>
<circle cx="600" cy="300" r="4" fill="black"/>

<circle cx="300" cy="300" r="4" fill="black"/>
<circle cx="700" cy="300" r="4" fill="black"/>

<text x="390" y="325">F1</text>
<text x="590" y="325">F2</text>

<text x="285" y="325">2F1</text>
<text x="685" y="325">2F2</text>

<!-- Object -->

<line
    x1="350"
    y1="300"
    x2="350"
    y2="200"
    stroke="black"
    stroke-width="3"/>

<polygon
    points="
    343,210
    357,210
    350,190
    "
    fill="black"/>

<text
    x="325"
    y="180">
    Object
</text>

<!-- Image -->

<line
    x1="820"
    y1="300"
    x2="820"
    y2="480"
    stroke="black"
    stroke-width="3"/>

<polygon
    points="
    813,470
    827,470
    820,490
    "
    fill="black"/>

<text
    x="800"
    y="515">
    Image
</text>


<!-- Parallel Ray -->

<line
    x1="350"
    y1="200"
    x2="500"
    y2="200"
    stroke="red"
    stroke-width="2"/>

<line
    x1="500"
    y1="200"
    x2="820"
    y2="480"
    stroke="red"
    stroke-width="2"/>

<!-- Optical Center Ray -->

<line
    x1="350"
    y1="200"
    x2="820"
    y2="480"
    stroke="green"
    stroke-width="2"/>


</svg>
